<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobFill AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #111111;
      color: #e5e5e5;
      min-height: 100vh;
      font-size: 13px;
    }
    .sidebar {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    .tabs {
      display: flex;
      background: #000000;
      border-bottom: 1px solid #333333;
      padding: 0;
    }
    .tab {
      flex: 1;
      padding: 12px;
      background: none;
      border: none;
      color: #999999;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
    }
    .tab.active { color: #ffffff; border-bottom: 2px solid #22c55e; }
    .tab:hover:not(.active) { color: #e5e5e5; }
    .tab-content { flex: 1; overflow-y: auto; padding: 16px; }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }
    h3 { margin: 0 0 12px; font-size: 14px; color: #ffffff; }
    label { display: block; margin-bottom: 4px; color: #999999; font-size: 12px; }
    textarea, input[type="text"], input[type="password"] {
      width: 100%;
      padding: 10px;
      background: #1a1a1a;
      border: 1px solid #333333;
      border-radius: 6px;
      color: #ffffff;
      font-size: 13px;
      margin-bottom: 12px;
      resize: vertical;
    }
    textarea { min-height: 80px; }
    button {
      background: #ffffff;
      color: #000000;
      border: none;
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      margin-right: 8px;
      margin-bottom: 8px;
    }
    button:hover { background: #e5e5e5; }
    button.secondary { background: #333333; color: #ffffff; }
    button.secondary:hover { background: #444444; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .profile-preview, .message { padding: 12px; background: #1a1a1a; border-radius: 6px; margin-bottom: 12px; }
    .profile-preview p { margin: 4px 0; }
    .skill-tag { display: inline-block; background: #333333; padding: 2px 8px; border-radius: 4px; margin: 2px; font-size: 11px; }
    .field-item {
      background: #1a1a1a;
      border: 1px solid #333333;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 8px;
    }
    .field-item .label { font-weight: 500; margin-bottom: 4px; }
    .field-item .meta { font-size: 11px; color: #666666; margin-bottom: 8px; }
    .field-item input, .field-item textarea { margin-bottom: 8px; }
    .type-badge { display: inline-block; padding: 2px 6px; border-radius: 4px; background: #333333; font-size: 10px; }
    .history-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: #1a1a1a;
      border-radius: 6px;
      margin-bottom: 8px;
      cursor: pointer;
      border: 1px solid #333333;
    }
    .history-item:hover { border-color: #666666; }
    .history-item img { width: 24px; height: 24px; border-radius: 4px; }
    .history-item .domain { font-weight: 500; }
    .history-item .date { font-size: 11px; color: #666666; }
    .error { color: #ef4444; font-size: 12px; margin-top: 8px; }
    .success { color: #22c55e; }
    .loading { opacity: 0.7; pointer-events: none; }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="tabs">
      <button class="tab active" data-tab="setup">Setup</button>
      <button class="tab" data-tab="fields">Fields</button>
      <button class="tab" data-tab="history">History</button>
      <button class="tab" data-tab="settings">Settings</button>
    </div>
    <div class="tab-content">
      <!-- Setup Tab -->
      <div id="setup" class="tab-pane active">
        <h3>Resume</h3>
        <textarea id="resumeText" placeholder="Paste your resume text or upload PDF..."></textarea>
        <button type="button" id="uploadPdf">Upload PDF</button>
        <input type="file" id="pdfInput" accept=".pdf" style="display:none">
        <button type="button" id="parseResume">Parse Resume</button>
        <div id="profilePreview" class="profile-preview" style="display:none"></div>

        <h3 style="margin-top:20px">Job Description</h3>
        <textarea id="jobDesc" placeholder="Paste the job description..."></textarea>
        <button type="button" id="analyzeJob">Analyze Job</button>

        <h3 style="margin-top:20px">Generate Answers</h3>
        <button type="button" id="generateAll">Generate All Answers</button>
        <div id="setupMessage"></div>
      </div>

      <!-- Fields Tab -->
      <div id="fields" class="tab-pane">
        <button type="button" id="scanFields">Scan Page</button>
        <button type="button" id="fillAll">Fill All</button>
        <p id="fieldCount" style="margin:8px 0; color:#999">No fields scanned yet.</p>
        <div id="fieldList"></div>
      </div>

      <!-- History Tab -->
      <div id="history" class="tab-pane">
        <button type="button" id="clearHistory">Clear History</button>
        <div id="historyList"></div>
      </div>

      <!-- Settings Tab -->
      <div id="settings" class="tab-pane">
        <h3>DeepSeek API Key</h3>
        <input type="password" id="apiKey" placeholder="sk-...">
        <button type="button" id="testApi">Test Connection</button>
        <h3 style="margin-top:20px">Language</h3>
        <select id="language" style="width:100%;padding:10px;background:#1a1a1a;border:1px solid #333;border-radius:6px;color:#fff;margin-bottom:12px">
          <option value="en">English</option>
          <option value="zh">Chinese</option>
          <option value="auto">Auto-detect</option>
        </select>
        <div id="settingsMessage"></div>
      </div>
    </div>
  </div>
  <script src="sidebar.js"></script>
</body>
</html>
